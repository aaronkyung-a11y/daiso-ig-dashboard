function fmt(n) {
  if (!n && n !== 0) return '-';
  if (n >= 10000) return (n / 10000).toFixed(1) + '만';
  if (n >= 1000) return (n / 1000).toFixed(1) + '천';
  return n.toString();
}

function fmtDuration(s) {
  if (!s) return '-';
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

let currentFilter = 'all';
let currentSort = 'score';

function render() {
  const container = document.getElementById('video-grid');
  container.innerHTML = '';

  let vids = [...(YT_DATA.videos || [])];
  if (currentFilter !== 'all') {
    vids = vids.filter(v => v.videoType === currentFilter);
  }

  const sortKey = currentSort;
  vids.sort((a, b) => {
    if (sortKey === 'score') return (b.score || 0) - (a.score || 0);
    if (sortKey === 'views') return (b.views || 0) - (a.views || 0);
    if (sortKey === 'likes') return (b.likes || 0) - (a.likes || 0);
    if (sortKey === 'date') return (b.uploadDate || '').localeCompare(a.uploadDate || '');
    return 0;
  });

  if (!vids.length) {
    container.innerHTML = '<div class="empty-state">해당 조건에 맞는 영상이 없습니다.</div>';
    return;
  }

  vids.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'video-card';
    const typeClass = v.videoType === 'Shorts' ? 'shorts' : 'long';
    const kindClass = v.channelKind === '인플루언서' ? 'influencer' :
                       v.channelKind === '공식' ? 'official' : '';
    card.innerHTML = `
      <div class="thumbnail-wrap">
        <img src="${v.thumbnail || ''}" alt="${v.title}" loading="lazy"
             onerror="this.style.display='none'">
        <span class="rank-badge">#${v.rank || i + 1}</span>
        <span class="type-badge ${typeClass}">${v.videoType}</span>
        <span class="duration-badge">${fmtDuration(v.lengthSeconds)}</span>
      </div>
      <div class="video-body">
        <div class="video-title">${v.title}</div>
        <div class="channel-row">
          <span>${v.channel}</span>
          <span class="channel-kind ${kindClass}">${v.channelKind || '기타'}</span>
        </div>
        <div class="stats-row">
          <div class="stat"><div class="num">${fmt(v.views)}</div><div class="lbl">조회수</div></div>
          <div class="stat"><div class="num">${fmt(v.likes)}</div><div class="lbl">좋아요</div></div>
          <div class="stat"><div class="num">${v.score || '-'}</div><div class="lbl">점수</div></div>
        </div>
        <div class="meta-row">
          <span class="meta-tag">${v.tag || ''}</span>
          <span class="meta-category">${v.category || ''}</span>
          <span>${v.uploadDate || ''}</span>
        </div>
      </div>
      <a class="card-link" href="${v.url}" target="_blank" rel="noopener">YouTube에서 보기 →</a>
    `;
    container.appendChild(card);
  });
}

function renderKPIs() {
  const vids = YT_DATA.videos || [];
  const total = vids.length;
  const shorts = vids.filter(v => v.videoType === 'Shorts').length;
  const totalViews = vids.reduce((s, v) => s + (v.views || 0), 0);
  const totalLikes = vids.reduce((s, v) => s + (v.likes || 0), 0);
  const kpi = document.getElementById('kpi-row');
  kpi.innerHTML = `
    <div class="kpi">
      <div class="label">총 영상 수</div>
      <div class="value">${total}</div>
      <div class="sub">Top 10 collection</div>
    </div>
    <div class="kpi">
      <div class="label">Shorts / 일반</div>
      <div class="value">${shorts} / ${total - shorts}</div>
      <div class="sub">숏폼 비중 ${total ? Math.round(shorts * 100 / total) : 0}%</div>
    </div>
    <div class="kpi">
      <div class="label">총 조회수</div>
      <div class="value">${fmt(totalViews)}</div>
      <div class="sub">누적</div>
    </div>
    <div class="kpi">
      <div class="label">총 좋아요</div>
      <div class="value">${fmt(totalLikes)}</div>
      <div class="sub">누적</div>
    </div>
  `;
}

function bindControls() {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      currentFilter = b.dataset.filter;
      render();
    });
  });
  document.getElementById('sort-select').addEventListener('change', (e) => {
    currentSort = e.target.value;
    render();
  });
}

document.getElementById('ts').textContent =
  'Last updated: ' + (YT_DATA.lastUpdated || new Date().toISOString());
renderKPIs();
render();
bindControls();
</script>
